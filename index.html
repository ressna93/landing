<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>landing</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <!---/////header/////-->
      <div class="header">
        <div class="zadu-logo">
          <img src="./images/logo_h.png" alt="ZADU 로고" />
          <!--///nav-menu///-->
          <ul class="nav-menu">
            <li>Home</li>
            <li>About</li>
            <li>Support</li>
            <button class="download">DOWNLOAD</button>
          </ul>
          <!--///hamburger///-->
          <button class="hamburger">hbg button</button>
        </div>
      </div>
      <!--/////MAIN/////-->
      <div class="main">
        <!--///hero-section///-->
        <div class="hero-section">
          <div class="text-contents">
            <p>제목</p>
            <p>설명</p>
            <button class="download">Download</button>
          </div>
          <div class="box-cat">
            <img src="./images/box-cat.png" alt="상자 쓴 고양이" />
          </div>
        </div>
        <!--///card-section///-->
        <div class="card-section">
          <img src="./images/img_4.jpg" alt="침대에 누워있는 고양이" />
          <div class="text-contents">
            <p>메인 글귀</p>
            <p>설명</p>
          </div>
        </div>
        <!--///gallery-section///-->
        <div class="gallery-section">
          <div class="mid-text">
            <p>제목</p>
            <p>설명</p>
          </div>
          <div class="image-gal">
            <img src="./images/img_1.jpg" alt="캣타워 고양이" />
            <img src="./images/img_2.jpg" alt="고양이 뒷모습" />
            <img src="./images/img_3.jpg" alt="고양이 앞모습" />
          </div>
          <div class="bot-container">
            <p>텍스트 설명</p>
            <button class="Learn-more">Learn More</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
